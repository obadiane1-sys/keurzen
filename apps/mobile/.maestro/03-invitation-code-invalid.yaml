appId: app.keurzen.mobile
---
- launchApp

- extendedWaitUntil:
    visible: "Bon retour !"
    timeout: 30000

# Cibler seulement "code d'invitation" (le mot "code" peut être ambigu, on prend "invitation")
- tapOn: ".*invitation.*"

- assertVisible: "Rejoindre un foyer"
- assertVisible: "Rejoindre le foyer"

# Taper sur la zone des cases (sous le sous-titre)
- tapOn:
    below: ".*6 chiffres.*"

- inputText: "999999"

- tapOn: "Rejoindre le foyer"

- extendedWaitUntil:
    visible: "Rejoindre un foyer"
    timeout: 5000
